<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color changer</title>
</head>
<style>
.box{
    width: 100px;
    height: 100px;
    border: 2px solid black;
    display: inline-block;
    margin: 20px;
    }
body {
    text-align: center;
}
    
#grey{
    padding: 30px;
   
    background-color: grey;
    border:2px solid black;
    margin-top: 20px;
    display: flex;
   justify-content: center;
}
#yellow{
    padding: 30px;

    background-color: yellow;
   border:2px solid black;
    margin-top: 20px;
   display: flex;
justify-content: center;
}
#red{
    padding: 30px;
    background-color: red;
   border:2px solid black;
   margin-top: 20px;
   display: flex;
justify-content: center;
}
#green{
    padding: 30px;
    background-color: green;
   border:2px solid black;
   display: flex;
   margin-top: 20px;
   justify-content: center;
}
</style>
<body>
    <h1>Color Changer</h1>
    <span class="button" id="grey">grey</span>
    <span class="button" id="yellow">yellow</span>
    <span class="button" id="red">red</span>
    <span class="button" id="green">green</span>
    
</body>
<script>
    let grey=document.getElementById('grey');
    let yellow=document.getElementById('yellow');
    let red=document.getElementById('red');
    let green=document.getElementById('green');
  
    grey.addEventListener('click',function(e){
       if( e.target.id==='grey'){
        document.body.style.backgroundColor='grey'
       }
       
    })
    yellow.addEventListener('click',function(e){
       if( e.target.id==='yellow'){
        document.body.style.backgroundColor='yellow'
       }
    })
    red.addEventListener('click',function(e){
       if( e.target.id==='red'){
        document.body.style.backgroundColor='red'
       }
    })
    green.addEventListener('click',function(e){
       if( e.target.id==='green'){
        document.body.style.backgroundColor='green'  //whole body
       }
    })
</script>
</html>
