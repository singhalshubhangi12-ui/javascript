<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <div class="statscontainer">
            
            <div class="details">
                <h1>Todo List</h1>
                <p>Keep It Up!</p>
                 <div id="progressbar">  <!--progress bar -->
                    <div id="progress"></div>
                </div>
            </div>
            <div class="statsnumber"></div>
            <p id="numbers">TD</p>
        </div>
        <form action="">
            <input type="text" id="inputbox" placeholder="type you text">
            <button onclick="addtask(event)" type="submit">+</button>
        </form>
        <ul id="listcontainer">
         <!--    <li class="checked">task1</li>
            <li>task2</li>
         -->
            </ul>
        <div class="result"></div>
            
    </div>
    <script src="app.js"></script>
</body>
</html>
